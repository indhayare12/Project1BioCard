<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,	initial-scale=1.0" />
    <title>Random Quote</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Quote of the Moment</h1>
      <section id="quote-card" class="quote-card">
        <p id="quote-text" class="quote-text">Loading...</p>
        <p id="quote-author" class="quote-author"></p>
      </section>
      <div class="actions">
        <button id="new-quote-btn" class="btn btn--primary">New quote</button>
        <button id="save-quote-btn" class="btn btn--secondary">
          ⭐ Save as favorite
        </button>
      </div>
      <p id="status-message" class="status"></p>
      <section class="favorites">
        <h2>My favorites</h2>
        <ul id="favorites-list" class="favorites-list"></ul>
        <p id="favorites-empty" class="favorites-empty">
          No favorites yet. Save a quote above to start your collection.
        </p>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
